const tierCfg = {
  ok:   { chipCls:'chip-ok',   icon:'●', badgeBg:'#E8F5E9', badgeColor:'#1B5E20' },
  part: { chipCls:'chip-part', icon:'◐', badgeBg:'#FFF3E0', badgeColor:'#BF360C' },
  hard: { chipCls:'chip-hard', icon:'○', badgeBg:'#FFEBEE', badgeColor:'#B71C1C' },
};
const sectionNames = { free:'가능 시나리오 분석', cost:'비용별 가능성', sec:'보안 문제 시 가능성' };

const tbody = document.getElementById('tbody');
data.forEach(r => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="col-name">${r.name}</td>
    <td class="col-idea">${r.idea}</td>
    ${['free','cost','sec'].map(k => {
      const d = r[k];
      const c = tierCfg[d.tier];
      return `<td>
        <button class="chip ${c.chipCls}" data-name="${r.name}" data-key="${k}">
          <span class="chip-icon">${c.icon}</span>
          <span class="chip-text">
            <span class="chip-label">${d.label}</span>
            <span class="chip-sub">${d.sub}</span>
          </span>
        </button>
      </td>`;
    }).join('')}
  `;
  tbody.appendChild(tr);
});

document.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    const r = data.find(d => d.name === btn.dataset.name);
    const k = btn.dataset.key;
    const d = r[k];
    const c = tierCfg[d.tier];
    const badge = document.getElementById('m-badge');
    badge.textContent = d.label;
    badge.style.background = c.badgeBg;
    badge.style.color = c.badgeColor;
    document.getElementById('m-who').textContent = r.name;
    document.getElementById('m-idea').textContent = r.idea;
    document.getElementById('m-section').textContent = sectionNames[k];
    document.getElementById('m-body').textContent = d.text;
    document.getElementById('m-tools').innerHTML = r.tools.map(t => `<span class="modal-tool">${t}</span>`).join('');
    document.getElementById('modal-bg').classList.add('open');
  });
});

function bgClose(e) { if (e.target === document.getElementById('modal-bg')) closeModal(); }
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
</script>
